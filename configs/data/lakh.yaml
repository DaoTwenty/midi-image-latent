## Lakh MIDI Dataset configuration
## Lakh MIDI Dataset (LMD full version) — raw .mid files
## Download: bash scripts/download_data.sh lakh
## Expected at: data/lakh/ (~178K MIDI files, 5.8 GB extracted)

data:
  dataset: lakh
  instruments:
    - drums
    - bass
    - guitar
    - piano
    - strings
  bars_per_instrument: 5000
  min_notes_per_bar: 2
  time_steps: 96
  target_resolution: [128, 128]

render:
  channel_strategy: velocity_only
  pitch_axis: height
  normalize_range: [-1.0, 1.0]
  resize_method: bilinear
