## Override: switch any experiment to POP909 dataset
## Usage: python scripts/run_experiment.py <CONFIG> --override-config configs/overrides/use_pop909.yaml
##
## POP909 — 909 pop songs (.mid extension, mostly 2/4 time)
## All tracks map to "piano" instrument (MIDI program 0).

data:
  dataset: pop909
  instruments:
    - piano

paths:
  data_root: data/pop909
