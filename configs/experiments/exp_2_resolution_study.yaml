## Experiment 2 — Resolution & Orientation Study
## 3 best VAEs from Exp 1A x 2 pitch_axis x 3 resolutions = 18 conditions
## Goal: Determine the best piano-roll image layout for VAE encoding.

paths:
  data_root: data/lakh
  output_root: outputs/exp_2_resolution_study/
  cache_dir: outputs/exp_2_resolution_study/cache/

data:
  dataset: lakh
  instruments:
    - drums
    - bass
    - guitar
    - piano
    - strings
  bars_per_instrument: 200000
  max_bars_total: 1000000
  min_notes_per_bar: 2
  time_steps: 96
  target_resolution: [128, 128]
  subset:
    subdirectory: f

# Default render config — pipeline sweeps over render_variants
render:
  channel_strategy: velocity_only
  pitch_axis: height
  normalize_range: [-1.0, 1.0]
  resize_method: bilinear

# Render sweep variants (2 orientations x 3 resolutions)
render_variants:
  - name: height_64x64
    channel_strategy: velocity_only
    pitch_axis: height
    normalize_range: [-1.0, 1.0]
    resize_method: bilinear
    target_resolution: [64, 64]

  - name: height_128x128
    channel_strategy: velocity_only
    pitch_axis: height
    normalize_range: [-1.0, 1.0]
    resize_method: bilinear
    target_resolution: [128, 128]

  - name: height_256x256
    channel_strategy: velocity_only
    pitch_axis: height
    normalize_range: [-1.0, 1.0]
    resize_method: bilinear
    target_resolution: [256, 256]

  - name: width_64x64
    channel_strategy: velocity_only
    pitch_axis: width
    normalize_range: [-1.0, 1.0]
    resize_method: bilinear
    target_resolution: [64, 64]

  - name: width_128x128
    channel_strategy: velocity_only
    pitch_axis: width
    normalize_range: [-1.0, 1.0]
    resize_method: bilinear
    target_resolution: [128, 128]

  - name: width_256x256
    channel_strategy: velocity_only
    pitch_axis: width
    normalize_range: [-1.0, 1.0]
    resize_method: bilinear
    target_resolution: [256, 256]

vaes:
  # Top 3 VAEs from Exp 1A results
  # 1. FLUX family, 16-ch, best PSNR 37.85
  - model_id: black-forest-labs/FLUX.1-dev
    name: flux1_dev
    latent_type: mean
    dtype: bfloat16
    batch_size: 64
    subfolder: vae

  # 2. CogView family, 16-ch, second-best PSNR 36.63
  - model_id: THUDM/CogView4-6B
    name: cogview4
    latent_type: mean
    dtype: bfloat16
    batch_size: 64
    subfolder: vae

  # 3. SD3 family, 16-ch, best musical metrics
  - model_id: stabilityai/stable-diffusion-3-medium-diffusers
    name: sd3_medium
    latent_type: mean
    dtype: float32
    batch_size: 64
    subfolder: vae

note_detection:
  method: global_threshold
  params:
    threshold: 0.5

sublatent:
  enabled: false
  approach: mlp
  target_dim: 64
  training:
    learning_rate: 0.0001
    epochs: 100
    batch_size: 64
    weight_decay: 0.00001
    pixel_weight: 1.0
    onset_weight: 5.0
    kl_weight: 0.001
    patience: 10

metrics:
  - reconstruction
  - harmony

metrics_exclude:
  - ssim
  - mutual_information_pitch_time

tracking:
  experiment_name: exp_2_resolution_study
  wandb_enabled: true
  wandb_project: midi-image-vae
  wandb_mode: online
  save_reconstructions: true
  save_latents: false
  checkpoint_every_n: 500

seed: 42
device: cuda
num_workers: 8
