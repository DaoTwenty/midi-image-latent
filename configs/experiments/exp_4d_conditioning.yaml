## Experiment 4D — Conditioned Sub-Latent Models
## Same pipeline as 4C + FeatureConditioner over 3 conditioning families
## Goal: Assess whether musical meta-features (instrument, pitch range, rhythm)
##       improve latent compression and reconstruction quality.
## Stages: Ingest → Render → Encode → TrainSubLatent(conditioned) → SubDecode
##          → Detect → Evaluate

paths:
  data_root: data/
  output_root: outputs/exp_4d/
  cache_dir: outputs/exp_4d/cache/

data:
  dataset: lakh
  instruments:
    - drums
    - bass
    - guitar
    - piano
    - strings
  bars_per_instrument: 5000
  min_notes_per_bar: 2
  time_steps: 96
  target_resolution: [128, 128]

render:
  channel_strategy: vos
  pitch_axis: height
  normalize_range: [-1.0, 1.0]
  resize_method: bilinear

vaes:
  # Best-performing VAE from Exp 1A (placeholder — update after Exp 1A)
  - model_id: stabilityai/sd-vae-ft-mse
    name: sd_vae_ft_mse
    latent_type: mean
    dtype: float32
    batch_size: 32

## Best sub-latent approach / dim from Exp 4C (placeholder — update after Exp 4C)
sublatent_base:
  approach: mlp
  target_dim: 64

## 3 conditioning families swept by the pipeline
conditioning_variants:
  - name: instrument_conditioning
    features:
      - instrument
    embed_dim: 32
    fusion: concat

  - name: pitch_range_conditioning
    features:
      - pitch_mean
      - pitch_std
      - pitch_range
    embed_dim: 32
    fusion: concat

  - name: rhythm_conditioning
    features:
      - note_density
      - onset_rate
      - tempo
    embed_dim: 32
    fusion: film

note_detection:
  method: global_threshold
  params:
    threshold: 0.5

## Default sub-latent config with conditioning enabled
sublatent:
  enabled: true
  approach: mlp
  target_dim: 64
  training:
    learning_rate: 0.0001
    epochs: 200
    batch_size: 64
    weight_decay: 0.00001
    pixel_weight: 1.0
    onset_weight: 5.0
    kl_weight: 0.001
    patience: 15
  conditioning:
    features:
      - instrument
    embed_dim: 32
    fusion: concat

metrics:
  - reconstruction
  - harmony
  - rhythm
  - dynamics
  - latent_space
  - information
  - conditioning

tracking:
  experiment_name: exp_4d_conditioning
  wandb_enabled: false
  wandb_project: midi-image-vae
  save_reconstructions: true
  save_latents: true
  checkpoint_every_n: 500

seed: 42
device: cuda
num_workers: 4
