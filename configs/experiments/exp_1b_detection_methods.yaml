## Experiment 1B — Detection Method Comparison
## 3 best VAEs from Exp 1A x 8 note detection methods = 24 conditions
## Goal: Identify the best note detection approach for piano-roll reconstruction.

paths:
  data_root: data/lakh
  output_root: outputs/exp_1b_detection_methods/
  cache_dir: outputs/exp_1b_detection_methods/cache/

data:
  dataset: lakh
  instruments:
    - drums
    - bass
    - guitar
    - piano
    - strings
  bars_per_instrument: 200000
  max_bars_total: 1000000
  min_notes_per_bar: 2
  time_steps: 96
  target_resolution: [128, 128]
  subset:
    subdirectory: f

render:
  channel_strategy: velocity_only
  pitch_axis: height
  normalize_range: [-1.0, 1.0]
  resize_method: bilinear

vaes:
  # Top 3 VAEs from Exp 1A (different families, complementary strengths)
  # flux1_dev: best PSNR (37.85), best onset F1 (0.316) — FLUX 16-ch
  - model_id: black-forest-labs/FLUX.1-dev
    name: flux1_dev
    latent_type: mean
    dtype: bfloat16
    batch_size: 64
    subfolder: vae

  # cogview4: 2nd-best PSNR (36.63), lowest pixel MSE (0.0112) — CogView 16-ch
  - model_id: THUDM/CogView4-6B
    name: cogview4
    latent_type: mean
    dtype: bfloat16
    batch_size: 64
    subfolder: vae

  # sd3_medium: best musical metrics (pitch_class 0.753, interval 0.412) — SD3 16-ch
  - model_id: stabilityai/stable-diffusion-3-medium-diffusers
    name: sd3_medium
    latent_type: mean
    dtype: float32
    batch_size: 64
    subfolder: vae

# Note: this experiment sweeps detection methods programmatically.
# The detection_methods list below is used by the pipeline sweep logic.
detection_methods:
  - name: global_threshold
    method: global_threshold
    params:
      threshold: 0.5

  - name: per_pitch_adaptive
    method: per_pitch_adaptive
    params:
      percentile: 75

  - name: hysteresis
    method: hysteresis
    params:
      threshold_on: 0.6
      threshold_off: 0.3

  - name: velocity_aware
    method: velocity_aware
    params:
      velocity_weight: 0.5
      threshold: 0.4

  - name: morphological
    method: morphological
    params:
      erosion_size: 2
      dilation_size: 2

  - name: hmm_tracker
    method: hmm_tracker
    params:
      n_states: 2

  - name: cnn_segmenter
    method: cnn_segmenter
    params:
      hidden_dim: 64

  - name: gmm_detector
    method: gmm_detector
    params:
      n_components: 2

note_detection:
  method: global_threshold
  params:
    threshold: 0.5

sublatent:
  enabled: false
  approach: mlp
  target_dim: 64
  training:
    learning_rate: 0.0001
    epochs: 100
    batch_size: 64
    weight_decay: 0.00001
    pixel_weight: 1.0
    onset_weight: 5.0
    kl_weight: 0.001
    patience: 10

metrics:
  - reconstruction
  - harmony
  - rhythm
  - dynamics
metrics_exclude:
  - ssim
  - mutual_information_pitch_time

tracking:
  experiment_name: exp_1b_detection_methods
  wandb_enabled: true
  wandb_project: midi-image-vae
  wandb_mode: online
  save_reconstructions: true
  save_latents: false
  checkpoint_every_n: 500

seed: 42
device: cuda
num_workers: 8
