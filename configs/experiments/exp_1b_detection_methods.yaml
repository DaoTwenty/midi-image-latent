## Experiment 1B — Detection Method Comparison
## Best VAE from Exp 1A, all 8 note detection methods
## Goal: Identify the best note detection approach for piano-roll reconstruction.

paths:
  data_root: data/
  output_root: outputs/exp_1b/
  cache_dir: outputs/exp_1b/cache/

data:
  dataset: lpd5
  instruments:
    - drums
    - bass
    - guitar
    - piano
    - strings
  bars_per_instrument: 5000
  min_notes_per_bar: 2
  time_steps: 96
  target_resolution: [128, 128]

render:
  channel_strategy: vos
  pitch_axis: height
  normalize_range: [-1.0, 1.0]
  resize_method: bilinear

vaes:
  # Single best-performing VAE from Exp 1A (placeholder — update after Exp 1A)
  - model_id: stabilityai/sd-vae-ft-mse
    name: sd_vae_ft_mse
    latent_type: mean
    dtype: float32
    batch_size: 32

# Note: this experiment sweeps detection methods programmatically.
# The detection_methods list below is used by the pipeline sweep logic.
detection_methods:
  - name: global_threshold
    method: global_threshold
    params:
      threshold: 0.5

  - name: per_pitch_adaptive
    method: per_pitch_adaptive
    params:
      percentile: 75

  - name: hysteresis
    method: hysteresis
    params:
      threshold_on: 0.6
      threshold_off: 0.3

  - name: velocity_aware
    method: velocity_aware
    params:
      velocity_weight: 0.5
      threshold: 0.4

  - name: morphological
    method: morphological
    params:
      erosion_size: 2
      dilation_size: 2

  - name: hmm_tracker
    method: hmm_tracker
    params:
      n_states: 2

  - name: cnn_segmenter
    method: cnn_segmenter
    params:
      hidden_dim: 64

  - name: gmm_detector
    method: gmm_detector
    params:
      n_components: 2

note_detection:
  method: global_threshold
  params:
    threshold: 0.5

sublatent:
  enabled: false
  approach: mlp
  target_dim: 64
  training:
    learning_rate: 0.0001
    epochs: 100
    batch_size: 64
    weight_decay: 0.00001
    pixel_weight: 1.0
    onset_weight: 5.0
    kl_weight: 0.001
    patience: 10

metrics:
  - reconstruction
  - harmony
  - rhythm

tracking:
  experiment_name: exp_1b_detection_methods
  wandb_enabled: false
  wandb_project: midi-image-vae
  save_reconstructions: true
  save_latents: false
  checkpoint_every_n: 500

seed: 42
device: cuda
num_workers: 4
